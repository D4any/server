services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    restart: unless-stopped
    ports:
      # DNS uniquement. L'admin web n'est plus publiée : on y accède via
      # nginx (HTTPS, port 443), à travers le réseau interne "proxy".
      - "53:53/tcp"
      - "53:53/udp"
    environment:
      TZ: "Europe/Paris"
      FTLCONF_webserver_api_password: "${PIHOLE_PASSWORD}"
      FTLCONF_dns_listeningMode: "ALL"
      FTLCONF_database_maxDBdays: "30"
    volumes:
      - "./etc-pihole:/etc/pihole"
    networks:
      - default
      - proxy

networks:
  proxy:
    external: true
