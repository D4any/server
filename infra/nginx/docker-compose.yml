services:
  nginx:
    container_name: nginx
    image: nginx:stable
    restart: unless-stopped
    ports:
      - "443:443/tcp"
    volumes:
      - "./conf.d:/etc/nginx/conf.d:ro"
      - "./certs:/etc/nginx/certs:ro"
    networks:
      - proxy

# Réseau partagé avec les services proxifiés, créé à la main :
#   docker network create proxy
networks:
  proxy:
    external: true
