# Point d'entrée TLS UNIQUE du Pi (port 443) — un seul server{} possible.
# Cert émis par `tailscale cert` (Let's Encrypt via Tailscale, validité 90 j).
#
# Routage PAR CHEMIN : Tailscale n'émet un cert que pour le nom EXACT de la
# machine (pas de wildcard → pas de sous-domaines type pihole.xxx.ts.net).
# Tous les services partagent donc ce server{} et se distinguent par leur URL.

server {
    listen 443 ssl;
    server_name srv-cyber-infra.tail46bedb.ts.net;

    ssl_certificate     /etc/nginx/certs/srv-cyber-infra.tail46bedb.ts.net.crt;
    ssl_certificate_key /etc/nginx/certs/srv-cyber-infra.tail46bedb.ts.net.key;

    # Firefly peut recevoir des imports/pièces jointes volumineux.
    client_max_body_size 100M;

    # Pi-hole — servi sous /pihole/ via le mécanisme reverse-proxy officiel de
    # Pi-hole v6 (webserver.paths.prefix="/pihole" côté conteneur). Le "/" final
    # du proxy_pass STRIPPE le préfixe : /pihole/admin → /admin, /pihole/api → /api.
    # Pi-hole regénère ses URLs (GUI ET API) sous /pihole → plus de collision avec
    # le /api de Firefly (qui occupe la racine). Accès : /pihole/admin
    location /pihole/ {
        proxy_pass http://pihole:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    # Confort : /pihole → page de login
    location = /pihole { return 301 /pihole/admin/; }

    # Grafana (monitoring) — servi sous /grafana/. Contrairement à Pi-hole, on
    # NE strippe PAS le préfixe : Grafana tourne avec SERVE_FROM_SUB_PATH=true et
    # ROOT_URL=.../grafana/, donc il ATTEND les requêtes avec /grafana/ intact.
    # → proxy_pass SANS "/" final (conserve l'URI complète).
    location /grafana/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    # Confort : /grafana → page d'accueil
    location = /grafana { return 301 /grafana/; }

    # Firefly III — servi à la RACINE (config officiellement supportée).
    # "firefly-app" = nom du conteneur, résolu par le DNS Docker sur "proxy".
    location / {
        proxy_pass http://firefly-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
