# Reverse proxy : point d'entrée TLS unique du Pi.
# Cert émis par `tailscale cert` (Let's Encrypt via Tailscale, validité 90 j).

server {
    listen 443 ssl;
    server_name srv-cyber-infra.tail46bedb.ts.net;

    ssl_certificate     /etc/nginx/certs/srv-cyber-infra.tail46bedb.ts.net.crt;
    ssl_certificate_key /etc/nginx/certs/srv-cyber-infra.tail46bedb.ts.net.key;

    # Pi-hole (interface d'admin). "pihole" = nom du conteneur, résolu par
    # le DNS interne de Docker sur le réseau partagé "proxy".
    location / {
        proxy_pass http://pihole:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
